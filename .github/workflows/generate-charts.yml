name: Generate charts

on:
  workflow_run:
    workflows: ["Update coding agent data", "Update PR agent data"]
    types: [completed]
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: bun install
      - name: Clean commit data (apply outlier correction)
        run: python3 src/fix_commit_totals.py --apply
      - name: Generate weekly summary
        run: python3 src/generate_weekly_summary.py
      - name: Generate all charts
        run: |
          bun run src/chart.ts
          bun run src/commit-share-chart.ts
          bun run src/pr-share-chart.ts
          bun run src/claude-dual-chart.ts
          bun run src/total-activity-chart.ts
      - name: Format
        run: bun run format
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add commit-data/ chart.png commit-share-chart.png pr-share-chart.png claude-dual-chart.png total-activity-chart.png weekly-summary.csv README.md
          git diff --staged --quiet || git commit -m "charts update"
          git checkout -- .
          git pull --rebase -X theirs
          git push
