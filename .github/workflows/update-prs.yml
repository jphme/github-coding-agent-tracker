name: Update PR agent data

on:
  schedule:
    - cron: "30 6 * * *" # daily at 6:30am UTC (offset from commit update at 6am)
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (YYYY-MM-DD), defaults to yesterday"
        required: false
      end_date:
        description: "End date (YYYY-MM-DD), defaults to start_date"
        required: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Fetch PR data
        run: |
          START="${{ inputs.start_date }}"
          END="${{ inputs.end_date }}"
          START="${START:-$(date -d 'yesterday' +%Y-%m-%d)}"
          if [ -n "$END" ]; then
            bun run src/fetch-prs.ts "$START" "$END"
          else
            bun run src/fetch-prs.ts "$START"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate PR share chart
        run: bun run src/pr-share-chart.ts

      - name: Format
        run: bun run format

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pr-data/ pr-share-chart.png
          git diff --staged --quiet || git commit -m "pr data update"
          git checkout -- .
          git pull --rebase -X theirs
          git push
