name: Daily data update

on:
  schedule:
    - cron: "0 6 * * *" # daily at 6am UTC
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (YYYY-MM-DD), defaults to yesterday"
        required: false
      end_date:
        description: "End date (YYYY-MM-DD), defaults to start_date"
        required: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: bun install

      # --- Fetch commit data (non-blocking) ---
      - name: Fetch commit data
        id: fetch-commits
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_START: ${{ inputs.start_date }}
          INPUT_END: ${{ inputs.end_date }}
        run: |
          START="${INPUT_START:-$(date -d 'yesterday' +%Y-%m-%d)}"
          if [ -n "$INPUT_END" ]; then
            bun run src/fetch-commits.ts "$START" "$INPUT_END"
          else
            bun run src/fetch-commits.ts "$START"
          fi

      # --- Fetch PR data (non-blocking) ---
      - name: Fetch PR data
        id: fetch-prs
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_START: ${{ inputs.start_date }}
          INPUT_END: ${{ inputs.end_date }}
        run: |
          START="${INPUT_START:-$(date -d 'yesterday' +%Y-%m-%d)}"
          if [ -n "$INPUT_END" ]; then
            bun run src/fetch-prs.ts "$START" "$INPUT_END"
          else
            bun run src/fetch-prs.ts "$START"
          fi

      # --- Fail early if both fetches failed (nothing to process) ---
      - name: Check at least one fetch succeeded
        if: steps.fetch-commits.outcome == 'failure' && steps.fetch-prs.outcome == 'failure'
        run: |
          echo "::error::Both commit and PR fetches failed. Nothing to update."
          exit 1

      # --- Process data and generate charts ---
      - name: Clean commit data (apply outlier correction)
        run: python3 src/fix_commit_totals.py --apply

      - name: Generate weekly summary
        run: python3 src/generate_weekly_summary.py

      - name: Generate all charts
        run: |
          bun run src/chart.ts
          bun run src/commit-share-chart.ts
          bun run src/pr-share-chart.ts
          bun run src/claude-dual-chart.ts
          bun run src/total-activity-chart.ts

      - name: Format
        run: bun run format

      # --- Single commit with all changes ---
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add commit-data-raw/ commit-data/ pr-data/ chart.png commit-share-chart.png pr-share-chart.png claude-dual-chart.png total-activity-chart.png weekly-summary.csv README.md
          git diff --staged --quiet || git commit -m "daily data update"
          git checkout -- .
          git pull --rebase -X theirs
          git push
