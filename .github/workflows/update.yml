name: Update coding agent data

on:
  schedule:
    - cron: "0 6 * * *" # daily at 6am UTC
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (YYYY-MM-DD), defaults to yesterday"
        required: false
      end_date:
        description: "End date (YYYY-MM-DD), defaults to start_date"
        required: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Fetch data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_START: ${{ inputs.start_date }}
          INPUT_END: ${{ inputs.end_date }}
        run: |
          START="${INPUT_START:-$(date -d 'yesterday' +%Y-%m-%d)}"
          if [ -n "$INPUT_END" ]; then
            bun run src/fetch.ts "$START" "$INPUT_END"
          else
            bun run src/fetch.ts "$START"
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add commit-data-raw/
          git diff --staged --quiet || git commit -m "data update"
          git checkout -- .
          git pull --rebase -X theirs
          git push
